name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]          # v1.0.0 這類 tag 也會觸發

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # 例: levi/ai-model-tester

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # 推送到 GHCR 需要此權限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自動提供，不需手動設定

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch          # main → :main
            type=sha,prefix=sha-           # → :sha-a1b2c3d
            type=semver,pattern={{version}} # v1.2.3 → :1.2.3
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha      # 使用 GitHub Actions 快取加速
          cache-to: type=gha,mode=max
